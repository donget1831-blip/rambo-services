<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rambo Services | Licensed Electrician & Driver in Kericho</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root { --gold: #f59e0b; --dark: #0f172a; --glass: rgba(255, 255, 255, 0.08); --glass-border: rgba(255, 255, 255, 0.18); }
* { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; scroll-behavior: smooth; }
body { background: #0f172a; color: white; }
.container { max-width: 1200px; margin: 0 auto; padding: 0 20px; }
.card { background: var(--glass); backdrop-filter: blur(20px); border: 1px solid var(--glass-border); border-radius: 20px; padding: 30px; margin: 30px 0; }
.btn { padding: 14px 28px; border-radius: 12px; font-weight: 600; border: none; cursor: pointer; font-size: 1rem; }
.btn-primary { background: linear-gradient(135deg, var(--gold), #d97706); color: var(--dark); }
nav { position: sticky; top: 0; z-index: 999; backdrop-filter: blur(20px); background: rgba(15,23,42,0.8); padding: 15px 0; }
input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: 1px solid var(--glass-border); background: rgba(255,255,255,0.05); color: white; }
.success { background: #10b981; padding: 15px; border-radius: 10px; display: none; }
</style>
</head>
<body>

<nav>
  <div class="container" style="display: flex; justify-content: space-between;">
    <h1 style="color: var(--gold);"><i class="fas fa-bolt"></i> Rambo Services</h1>
    <a href="#booking" class="btn btn-primary">Book Now</a>
  </div>
</nav>

<div class="container">

  <!-- HERO -->
  <section style="padding: 80px 0; text-align: center;">
    <img src="https://i.postimg.cc/xTynYfDS/1529a782f5938692482a81f159e2616f.jpg" style="width: 180px; height: 180px; border-radius: 50%; border: 4px solid var(--gold);">
    <h1 style="font-size: 2.5rem; margin-top: 20px;">Professional Electrician & Driver</h1>
  </section>

  <!-- ABOUT -->
  <section id="about">
    <div class="card" style="display: flex; gap: 30px; flex-wrap: wrap;">
      <img src="https://i.postimg.cc/xTynYfDS/1529a782f5938692482a81f159e2616f.jpg" style="width: 250px; border-radius: 20px;">
      <div><h2>Meet Rambo</h2><p>Licensed electrician and driver in Kericho County.</p></div>
    </div>
    <img src="https://i.postimg.cc/wTG897fZ/images-(9).jpg" style="width: 100%; height: 400px; border-radius: 20px; object-fit: cover;">
  </section>

  <!-- BOOKING FORM - SENDS TO EMAIL -->
  <section id="booking">
    <h2 style="text-align: center; color: var(--gold);">Book Rambo Now</h2>
    
    <form class="card" action="https://formspree.io/f/YOUR_FORMSPREE_ID" method="POST" enctype="multipart/form-data">
      
      <div class="success" id="success">Booking Received! We will confirm in 30 mins</div>
      
      <h3>Step 1: Your Details</h3>
      <input type="text" name="Name" placeholder="Full Name" required>
      <input type="tel" name="Phone" placeholder="Phone Number" required>
      
      <label><b>Date & Time</b></label>
      <input type="datetime-local" name="Date and Time" required>
      
      <label><b>Location</b></label>
      <input type="text" name="Location" placeholder="e.g. Kericho Town" required>
      
      <input type="hidden" name="_subject" value="NEW BOOKING - Rambo Services">

      <div style="margin-top: 30px; border: 2px solid var(--gold); padding: 20px; border-radius: 15px;">
        <h3><i class="fas fa-money-bill-wave"></i> Step 2: Pay KES 500</h3>
        <div style="background: rgba(15,23,42,0.5); padding: 20px; text-align: center;">
          <p>Lipa na M-Pesa > Buy Goods</p>
          <h3 style="color: var(--gold); font-size: 2rem;">Till: 3280910</h3>
        </div>
        <label style="color: red;"><i class="fas fa-receipt"></i> REQUIRED: Upload M-Pesa Screenshot</label>
        <input type="file" name="M-Pesa Screenshot" accept="image/*" required>
      </div>

      <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 20px;">
        <i class="fas fa-paper-plane"></i> Submit Booking
      </button>
    </form>
  </section>

  <footer style="text-align: center; padding: 40px 0;">© 2026 Rambo Services</footer>
</div>

<script>
var form = document.querySelector('form');
form.addEventListener("submit", function(e) {
  setTimeout(function() {
    document.getElementById("success").style.display = "block";
    form.reset();
  }, 1000);
});
</script>

</body>
</html>
